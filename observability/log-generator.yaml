apiVersion: v1
kind: Namespace
metadata:
  name: lab09
  labels:
    app.kubernetes.io/part-of: devops-labs
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator
  namespace: lab09
  labels:
    app.kubernetes.io/name: log-generator
    app.kubernetes.io/part-of: devops-labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: log-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: log-generator
        app.kubernetes.io/part-of: devops-labs
    spec:
      containers:
        - name: log-generator
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "$(date -Iseconds) level=info lab=09 service=log-generator message=\"centralized logging test event\""
                sleep 5
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
