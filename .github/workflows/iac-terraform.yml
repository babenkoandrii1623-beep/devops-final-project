name: Lab 08 Terraform IaC

on:
  push:
    branches:
      - main
      - master
    paths:
      - "terraform/**"
      - ".github/workflows/iac-terraform.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "terraform/**"
      - ".github/workflows/iac-terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: terraform

jobs:
  validate:
    name: Terraform fmt, init and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform -chdir=$TF_WORKING_DIR fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=$TF_WORKING_DIR init -backend=false

      - name: Terraform validate
        run: terraform -chdir=$TF_WORKING_DIR validate

  plan-apply:
    name: Terraform plan and apply
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    environment: lab08
    env:
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image names
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "BACKEND_IMAGE=ghcr.io/${repository}/backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${repository}/frontend" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Skip apply when KUBE_CONFIG is not configured
        if: env.KUBE_CONFIG_DATA == ''
        run: |
          echo "KUBE_CONFIG secret is not configured. Terraform validate completed; plan/apply skipped."

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_DATA != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Terraform init
        if: env.KUBE_CONFIG_DATA != ''
        run: terraform -chdir=$TF_WORKING_DIR init

      - name: Terraform plan
        if: env.KUBE_CONFIG_DATA != ''
        run: |
          terraform -chdir=$TF_WORKING_DIR plan -out=lab08.tfplan \
            -var "kubeconfig_path=$HOME/.kube/config" \
            -var "kube_context=" \
            -var "frontend_image_repository=$FRONTEND_IMAGE" \
            -var "frontend_image_tag=${GITHUB_SHA}" \
            -var "frontend_image_pull_policy=Always" \
            -var "backend_image_repository=$BACKEND_IMAGE" \
            -var "backend_image_tag=${GITHUB_SHA}" \
            -var "backend_image_pull_policy=Always"

      - name: Terraform apply
        if: env.KUBE_CONFIG_DATA != ''
        run: terraform -chdir=$TF_WORKING_DIR apply -auto-approve lab08.tfplan
