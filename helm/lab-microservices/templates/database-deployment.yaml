{{- if .Values.database.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lab-microservices.databaseName" . }}
  labels:
    {{- include "lab-microservices.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "lab-microservices.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      {{- if .Values.security.serviceAccounts.enabled }}
      serviceAccountName: {{ include "lab-microservices.databaseServiceAccountName" . }}
      automountServiceAccountToken: {{ .Values.security.serviceAccounts.automountServiceAccountToken }}
      {{- end }}
      {{- with .Values.database.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: database
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.database.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lab-microservices.secretName" . }}
                  key: POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: {{ .Values.database.service.targetPort }}
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.auth.username | quote }}
                - -d
                - {{ .Values.database.auth.database | quote }}
            initialDelaySeconds: 30
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.auth.username | quote }}
                - -d
                - {{ .Values.database.auth.database | quote }}
            initialDelaySeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres-data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          {{- with .Values.database.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.database.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.database.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "lab-microservices.databaseName" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: init-sql
          configMap:
            name: {{ include "lab-microservices.databaseInitConfigName" . }}
{{- end }}
