apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lab-microservices.backendConfigName" . }}
  labels:
    {{- include "lab-microservices.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  NODE_ENV: {{ .Values.backend.env.NODE_ENV | quote }}
  PORT: {{ .Values.backend.containerPort | quote }}

