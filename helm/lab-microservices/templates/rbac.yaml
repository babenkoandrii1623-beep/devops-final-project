{{- if and .Values.security.serviceAccounts.enabled .Values.security.rbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lab-microservices.fullname" . }}-readonly
  labels:
    {{- include "lab-microservices.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lab-microservices.fullname" . }}-backend-readonly
  labels:
    {{- include "lab-microservices.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "lab-microservices.backendServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "lab-microservices.fullname" . }}-readonly
{{- end }}
