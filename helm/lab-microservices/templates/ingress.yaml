{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lab-microservices.fullname" . }}
  labels:
    {{- include "lab-microservices.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        {{- range .Values.ingress.hosts }}
        - {{ .host | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ $.Values.ingress.apiPath | quote }}
            pathType: {{ $.Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "lab-microservices.backendName" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
          - path: {{ $.Values.ingress.frontendPath | quote }}
            pathType: {{ $.Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "lab-microservices.frontendName" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
    {{- end }}
{{- end }}

